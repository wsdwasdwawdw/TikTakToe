<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik Tak Toe</title>

    <link rel="stylesheet" href="Styles/Main.css">
    <link rel="stylesheet" href="Styles/Computer.css">
    <link rel="stylesheet" href="Styles/Player.css">
</head>

<body>
    <div class="mainMenu">
        <h1>Tik Tak Toe</h1>
        <button class="computer">VS Computer</button>
        <button class="player">VS Player</button>
    </div>

    <section class="vsComputer hide">
        <p class="back">←</p>
        <div class="container">
            <h1>Tic Tac Toe</h1>

            <div class="scoreBoard">
                <div class="playerScore">
                    <span>You:</span>
                    <span class="score1">0</span>
                </div>
                <div class="computerScore">
                    <span>Computer:</span>
                    <span class="score2">0</span>
                </div>
            </div>
            <table>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>

            <button class="reset">Restart</button>
        </div>

    </section>

    <section class="vsPlayer hide">
        <p class="back">←</p>
        <div class="playerSettings">
            <h1>Player Settings</h1>
            <label for="player1">Player 1:</label>
            <input type="text" id="player1" name="player1" placeholder="Player 1">
            <label for="player2">Player 2:</label>
            <input type="text" id="player2" name="player2" placeholder="Player 2">
            <button class="start">Start Game</button>
        </div>

        <div class="container hide">
            <div class="menu hide">
                <h1></h1>
                <button class="reset">Restart</button>
                <button class="exit">Exit</button>
                <button class="continue">Continue</button>
            </div>
            <h1>Tic Tac Toe</h1>

            <div class="scoreBoard">
                <div class="player1Score">
                    <span class="name1">:</span>
                    <span class="score1">0</span>
                </div>
                <div class="player2Score">
                    <span class="name2">:</span>
                    <span class="score2">0</span>
                </div>
            </div>

            <table>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </div>

    </section>
    <script src="player.js"></script>
    <script src="script.js"></script>


</body>

</html>
