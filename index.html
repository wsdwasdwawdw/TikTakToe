<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik Tak Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="mainMenu">
        <div>
            <h1>Tik Tak Toe</h1>
            <button class="computer">VS Computer</button>
            <button class="player">VS Player</button>
        </div>
    </section>

    <section class="vsComputer hide">
        <p class="back">←</p>
        <div class="menu hide">
            <h1></h1>
            <button class="reset">Restart</button>
            <button class="exit">Exit</button>
            <button class="continue">Continue</button>
        </div>
        <div class="scores">
            <h1>Player: 0 Computer: 0</h1>
        </div>
        <table>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>
    </section>

    <div class="vsPlayer hide">

        <div class="playerSettings">
            <h1>Player Settings</h1>
            <label for="player1">Player 1 Name:</label>
            <input type="text" id="player1" name="player1" placeholder="Player 1">
            <label for="player2">Player 2 Name:</label>
            <input type="text" id="player2" name="player2" placeholder="Player 2">
            <button class="start">Start Game</button>
        </div>

        <div class="container hide">
            <p class="back">←</p>
            <div class="menu hide">
                <h1></h1>
                <button class="reset">Restart</button>
                <button class="exit">Exit</button>
                <button class="continue">Continue</button>
            </div>
            <div class="scores">
                <h1></h1>
            </div>
            <table>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>
        </div>

        </section>
        <script src="player.js"></script>
        <script src="script.js"></script>


</body>

</html>
