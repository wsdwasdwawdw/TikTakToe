<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik Tak Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="mainMenu">
        <div>
            <h1>Tik Tak Toe</h1>
            <button class="computer">VS Computer</button>
            <button class="player">VS Player</button>
        </div>
    </section>

    <section class="vsComputer hide">
        <p class="back">←</p>
        <div class="menu hide">
            <h1></h1>
            <button class="reset">Reset</button>
            <button class="exit">Exit</button>
            <button class="continue">Continue</button>
        </div>
        <div class="scores">
            <h1>Player: 0 Computer: 0</h1>
        </div>
        <table>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>
    </section>

    <section class="vsPlayer hide">
        <p class="back">←</p>
        <div class="menu hide">
            <h1></h1>
            <button class="reset">Reset</button>
            <button class="exit">Exit</button>
            <button class="continue">Continue</button>
        </div>
        <div class="scores">
            <h1>P1: 0 P2: 0</h1>
        </div>
        <table>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>
    </section>
    <script src="player.js"></script>
    <script src="script.js"></script>


</body>

</html>
